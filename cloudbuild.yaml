steps:
  # 1. ตรวจสอบโค้ด (SAST) ด้วย SonarQube
  - name: "sonarsource/sonar-scanner-cli"
    args:
      - "-X"
      - "-Dsonar.projectKey=gc-poc-project"
      - "-Dsonar.organization=thitikarnt"
      - "-Dsonar.sources=."
      - "-Dsonar.host.url=https://sonarcloud.io"
      - "-Dsonar.login=$_SONAR_TOKEN"

  # 2. ตรวจสอบ Library (SCA) ด้วย Trivy
  - name: "aquasec/trivy:0.49.1" # <--- เติม :0.49.1 เข้าไป
    entrypoint: "sh"
    args:
      - "-c"
      - "trivy fs . --severity HIGH,CRITICAL --exit-code 0"

  # 3. สร้างกล่องแอป (Docker Build)
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "asia-southeast1-docker.pkg.dev/$PROJECT_ID/my-repo/streamlit-app",
        ".",
      ]

  # 4. ตรวจสอบกล่องแอป (Container Scan) ด้วย Trivy# 4. ตรวจสอบกล่องแอป (Container Scan) ด้วย Trivy
  - name: "aquasec/trivy:0.49.1" # <--- จุดนี้ก็ต้องเติม :0.49.1 ด้วยครับ
    args:
      [
        "image",
        "--severity",
        "HIGH,CRITICAL",
        "--exit-code",
        "0",
        "asia-southeast1-docker.pkg.dev/$PROJECT_ID/my-repo/streamlit-app",
      ]

  # 5. push image ไป Artifact Registry
  # 5. push image ไป Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args: [
        "push",
        "asia-southeast1-docker.pkg.dev/$PROJECT_ID/my-repo/streamlit-app", # ลบ :$COMMIT_SHA ออก
      ]

  # 6. ส่งขึ้น Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "gc-web-app"
      - "--image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/my-repo/streamlit-app"
      - "--region=asia-southeast1"
      - "--platform=managed"
      - "--allow-unauthenticated"

# ตัวแปรเสริม (Substitutions)
substitutions:
  _SONAR_TOKEN: "dd823415db4c01d2514b3a055c3c39b1e8cc3dac"

# ... (โค้ดส่วนเดิมของคุณ) ...

# เพิ่มส่วนนี้ลงไปท้ายไฟล์ครับ
options:
  logging: CLOUD_LOGGING_ONLY
